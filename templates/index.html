<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentForge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>ContentForge</h1>
        <p>Generador de carruseles</p>
        <form action="/generar" method="POST">
            <label for="texto">Texto del carrusel:</label>
            <textarea name="texto" id="texto" rows="10" placeholder="Escribí tu texto aquí..." required></textarea>
            <label for="paleta">Paleta de colores:</label>
            <select name="paleta" id="paleta">
                <option value="oscuro">Oscuro</option>
                <option value="claro">Claro</option>
                <option value="vibrante">Vibrante</option>
                <option value="naturaleza">Naturaleza</option>
                <option value="pastel">Pastel</option>
                <option value="neon">Neon</option>
                <option value="sabrina">Sabrina</option>
            </select>

            <label for="fuente">Fuente:</label>
            <select name="fuente" id="fuente">
                <option value="">Predeterminada (Arial)</option>
                {% for f in fuentes %}
                <option value="{{ f }}">{{ f }}</option>
                {% endfor %}
            </select>

           <label for="tamano">Tamaño de fuente (px):</label>
            <select name="tamano" id="tamano">
                {% for v in tamano_opciones %}
                <option value="{{ v }}" {% if v == 80 %}selected{% endif %}>{{ v }}px</option>
                {% endfor %}
            </select>

            <label for="preset_tamano">Tamaño de slide:</label>
            <select name="preset_tamano" id="preset_tamano">
                <option value="cuadrado">Cuadrado (1080×1080)</option>
                <option value="vertical">Vertical (1080×1920)</option>
                <option value="horizontal">Horizontal (1920×1080)</option>
            </select>

            <label for="num_slides">Cantidad de slides:</label>
                <select name="num_slides" id="num_slides">
                    <option value="">Auto</option>
                    {% for n in range(1, 21) %}
                    <option value="{{ n }}">{{ n }}</option>
                    {% endfor %}
                </select>

            <label>Alineación:</label>
            <div class="radio-group">
                <label><input type="radio" name="alineacion" value="izquierda"> Izquierda</label>
                <label><input type="radio" name="alineacion" value="centro" checked> Centro</label>
                <label><input type="radio" name="alineacion" value="derecha"> Derecha</label>
            </div>

            <button type="submit">Generar</button>
        </form>
        {% if ruta %}
        <div class="resultado">
            <h2>Carrusel generado</h2>
            <p>Ruta: <code>{{ ruta }}</code></p>
        </div>
        {% endif %}

    </div>
</body>
</html>
