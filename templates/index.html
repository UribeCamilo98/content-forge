<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentForge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>ContentForge</h1>
        <p>Generador de carruseles</p>
        <div class="split-layout">
            <!-- ===== COLUMNA IZQUIERDA: FORMULARIO ===== -->
            <div class="form-col">
                <form id="form-preview" method="POST" action="/generar">
                    <!-- === 1. TEXTO === -->
                    <fieldset>
                        <legend>📝 Texto</legend>
                        <textarea name="texto" id="texto" rows="3" placeholder="Escribí tu texto aquí..."
                            required></textarea>
                    </fieldset>
                    <!-- === 2. TIPOGRAFÍA === -->
                    <fieldset>
                        <legend>🔤 Tipografía</legend>
                        <div class="grid-2">
                            <label>Fuente:
                                <select name="fuente">
                                    <option value="">Predeterminada (Arial)</option>
                                    {% for f in fuentes %}
                                    <option value="{{ f }}">{{ f }}</option>
                                    {% endfor %}
                                </select>
                            </label>
                            <label>Tamaño:
                                <select name="tamano">
                                    {% for v in tamano_opciones %}
                                    <option value="{{ v }}" {% if v==80 %}selected{% endif %}>{{ v }}px</option>
                                    {% endfor %}
                                </select>
                            </label>
                        </div>
                        <label>Alineación:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="alineacion" value="izquierda"> Izquierda</label>
                            <label><input type="radio" name="alineacion" value="centro" checked> Centro</label>
                            <label><input type="radio" name="alineacion" value="derecha"> Derecha</label>
                            <label><input type="radio" name="alineacion" value="justificado"> Justificado</label>
                        </div>
                    </fieldset>
                    <!-- === 3. COLOR === -->
                    <fieldset>
                        <legend>🎨 Color</legend>
                        <label>Paleta de colores:
                            <select name="paleta" id="paleta-select">
                                <option value="">— Personalizado —</option>
                                {% for nombre, colores in paletas.items() %}
                                <option value="{{ nombre }}" data-fondo="{{ colores.fondo }}"
                                    data-texto="{{ colores.texto }}" {% if nombre=='oscuro' %}selected{% endif %}>{{
                                    nombre | capitalize }}</option>
                                {% endfor %}
                            </select>
                        </label>
                        <div class="grid-2">
                            <label>Color de fondo:
                                <input type="color" name="color_fondo" value="#191923">
                            </label>
                            <label>Color de texto:
                                <input type="color" name="color_texto" value="#ffffff">
                            </label>
                        </div>
                    </fieldset>
                    <!-- === 4. BORDE === -->
                    <fieldset>
                        <legend>✏️ Borde</legend>
                        <label>
                            <input type="checkbox" name="borde_activar" id="borde_activar">
                            Activar
                        </label>
                        <div id="borde-controls" class="hidden">
                            <div class="grid-2">
                                <label>Color:
                                    <input type="color" name="borde_color" value="#000000">
                                </label>
                                <label>Grosor:
                                    <input type="number" name="borde_grosor" min="1" max="10" value="3">
                                </label>
                            </div>
                        </div>
                    </fieldset>
                    <!-- === 5. SOMBRA === -->
                    <fieldset>
                        <legend>👤 Sombra</legend>
                        <label>
                            <input type="checkbox" name="sombra_activar" id="sombra_activar">
                            Activar
                        </label>
                        <div id="sombra-controls" class="hidden">
                            <div class="grid-2">
                                <label>Color:
                                    <input type="color" name="sombra_color" value="#808080">
                                </label>
                                <label></label>
                            </div>
                            <div class="grid-2">
                                <label>Offset X:
                                    <input type="number" name="sombra_offset_x" min="0" max="20" value="5">
                                </label>
                                <label>Offset Y:
                                    <input type="number" name="sombra_offset_y" min="0" max="20" value="5">
                                </label>
                            </div>
                        </div>
                    </fieldset>
                    <!-- === 6. SLIDE === -->
                    <fieldset>
                        <legend>🖼️ Slide</legend>
                        <div class="grid-2">
                            <label>Tamaño:
                                <select name="preset_tamano">
                                    <option value="cuadrado">Cuadrado (1080×1080)</option>
                                    <option value="vertical">Vertical (1080×1920)</option>
                                    <option value="horizontal">Horizontal (1920×1080)</option>
                                </select>
                            </label>
                            <label>Cantidad:
                                <select name="num_slides">
                                    <option value="">Auto</option>
                                    {% for n in range(1, 21) %}
                                    <option value="{{ n }}">{{ n }}</option>
                                    {% endfor %}
                                </select>
                            </label>
                        </div>
                    </fieldset>
                     <!-- === 7. FONDO === -->
                    <fieldset>
                        <legend>🖼️ Fondo</legend>
                        <label>
                            <input type="checkbox" name="fondo_activar" id="fondo_activar">
                            Activar imagen de fondo
                        </label>
                        <div id="fondo-controls" class="hidden">
                            <label>Imagen de fondo:</label>
                            <select name="imagen_fondo">
                                <option value="">Ninguna (color sólido)</option>
                                {% if imagenes_agrupadas.preinstaladas %}
                                <optgroup label="Preinstaladas">
                                    {% for img in imagenes_agrupadas.preinstaladas %}
                                    <option value="{{ img }}">{{ img }}</option>
                                    {% endfor %}
                                </optgroup>
                                {% endif %}
                                {% if imagenes_agrupadas.subidas %}
                                <optgroup label="Subidas">
                                    {% for img in imagenes_agrupadas.subidas %}
                                    <option value="{{ img }}">{{ img }}</option>
                                    {% endfor %}
                                </optgroup>
                                {% endif %}
                            </select>
                            <div class="upload-area">
                                <label>Subir nueva imagen:</label>
                                <div class="upload-row">
                                    <input type="file" id="upload-input" accept="image/png,image/jpeg,image/webp,image/bmp">
                                    <button type="button" id="btn-upload">Subir</button>
                                </div>
                                <div id="upload-mensaje"></div>
                            </div>
                            <label>Opacidad de la imagen:
                                <input type="range" name="opacidad_imagen" id="opacidad_imagen" min="0" max="100" value="100">
                                <span id="opacidad-valor">100%</span>
                            </label>
                        </div>
                    </fieldset>
                    <!-- === 8. OVERLAY === -->
                    <fieldset>
                        <legend>🖼️ Imagen Overlay</legend>
                        <label>
                            <input type="checkbox" name="overlay_activo" id="overlay_activo">
                            Activar overlay
                        </label>
                        <div id="overlay-controls" class="hidden">
                            <label>Pack:
                                <select name="overlay_pack" id="overlay_pack">
                                    {% for pack in overlays_agrupados.keys() %}
                                    <option value="{{ pack }}" {% if pack=="placeholder" %}selected{% endif %}>
                                        {{ pack | capitalize }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </label>
                            <label id="ph-color-label" class="hidden">Color placeholder:
                                <input type="color" name="overlay_color_ph" value="#59aadc">
                            </label>
                            <label>Imagen:
                                <select name="overlay_archivo" id="overlay_archivo"></select>
                            </label>
                            <label>Posición:</label>
                            <div class="radio-group">
                                <label><input type="radio" name="overlay_posicion" value="centro" checked> Centro</label>
                                <label><input type="radio" name="overlay_posicion" value="izquierda"> Izquierda</label>
                                <label><input type="radio" name="overlay_posicion" value="derecha"> Derecha</label>
                                <label><input type="radio" name="overlay_posicion" value="arriba"> Arriba</label>
                                <label><input type="radio" name="overlay_posicion" value="abajo"> Abajo</label>
                                <label><input type="radio" name="overlay_posicion" value="detras"> Detrás</label>
                            </div>
                            <label>Tamaño:
                                <input type="range" name="overlay_tamano" id="overlay_tamano"
                                    min="50" max="200" value="100">
                                <span id="overlay-tamano-valor">100%</span>
                            </label>
                            <label>Rotación:
                                <input type="range" name="overlay_rotacion" id="overlay_rotacion"
                                    min="0" max="360" value="0">
                                <span id="overlay-rotacion-valor">0°</span>
                            </label>
                            <div class="grid-2">
                                <label><input type="checkbox" name="overlay_flip_x"> Flip X</label>
                                <label><input type="checkbox" name="overlay_flip_y"> Flip Y</label>
                            </div>
                            <label>Opacidad:
                                <input type="range" name="overlay_opacidad" id="overlay_opacidad"
                                    min="0" max="100" value="100">
                                <span id="overlay-opacidad-valor">100%</span>
                            </label>
                            <fieldset style="margin-top:8px">
                                <legend>Borde Overlay</legend>
                                <label>
                                    <input type="checkbox" name="overlay_borde_activar" id="overlay_borde_activar">
                                    Activar
                                </label>
                                <div id="overlay-borde-controls" class="hidden">
                                    <div class="grid-2">
                                        <label>Color:
                                            <input type="color" name="overlay_borde_color" value="#000000">
                                        </label>
                                        <label>Grosor:
                                            <input type="range" name="overlay_borde_grosor" id="overlay_borde_grosor"
                                                min="1" max="10" value="2">
                                            <span id="overlay-borde-grosor-valor">2</span>
                                        </label>
                                    </div>
                                </div>
                            </fieldset>
                            <fieldset style="margin-top:8px">
                                <legend>Sombra Overlay</legend>
                                <label>
                                    <input type="checkbox" name="overlay_sombra_activar" id="overlay_sombra_activar">
                                    Activar
                                </label>
                                <div id="overlay-sombra-controls" class="hidden">
                                    <label>Color:
                                        <input type="color" name="overlay_sombra_color" value="#808080">
                                    </label>
                                    <div class="grid-2">
                                        <label>Offset X:
                                            <input type="range" name="overlay_sombra_offset_x" id="overlay_sombra_offset_x"
                                                min="0" max="50" value="5">
                                            <span id="overlay-sombra-offset-x-valor">5</span>
                                        </label>
                                        <label>Offset Y:
                                            <input type="range" name="overlay_sombra_offset_y" id="overlay_sombra_offset_y"
                                                min="0" max="50" value="5">
                                            <span id="overlay-sombra-offset-y-valor">5</span>
                                        </label>
                                    </div>
                                </div>
                            </fieldset>
                        </div>
                    </fieldset>
                    <input type="hidden" name="slide_index" id="slide_index" value="0">
                </form>
            </div>
            <!-- ===== COLUMNA DERECHA: PREVIEW ===== -->
            <div class="preview-col">
                <div class="preview-container">
                    <img id="preview-img" src="" alt="Preview">
                    <div class="nav-controls">
                        <button type="button" id="prev-slide">◀</button>
                        <span id="slide-counter">1/1</span>
                        <button type="button" id="next-slide">▶</button>
                    </div>
                    <button type="button" id="btn-generar" class="btn-generar">Generar Carrusel</button>
                    <span id="generar-loader" class="loader hidden">Generando...</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        var OVERLAYS_AGRUPADOS = {{ overlays_agrupados | tojson | safe }};
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
